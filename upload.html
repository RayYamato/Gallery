<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đóng góp ảnh</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <a href="index.html" class="upload-btn">← Quay về Gallery Ảnh</a>
  </div>

  <div class="upload-page">
    <div class="upload-card">

      <h2 class="upload-title">📸 Đóng góp thêm ảnh</h2>
      <p class="upload-subtitle">
        Chọn ảnh hoặc kéo thả trực tiếp vào khung bên dưới
      </p>

      <!-- SELECT AREA -->
      <div class="video-select-wrapper">
        <input type="file" id="uploadInput" multiple accept="image/*" style="display:none;">

        <div class="video-drop-row" id="dropZone">
          <button id="selectFileBtn" class="upload-btn select-video-btn">
            📸 Chọn ảnh
          </button>

          <div id="fileNameDisplay" class="file-display">
            Kéo thả ảnh vào đây hoặc chọn từ thiết bị
          </div>
        </div>
      </div>

      <div class="upload-action">
        <button id="uploadBtn" class="upload-btn upload-main-btn">
          ⬆️ Tải ảnh lên Gallery
        </button>
      </div>

      <p id="status" class="upload-status"></p>

    </div>
  </div>

  <script src="upload.js"></script>

  <script>
    const selectBtn = document.getElementById('selectFileBtn');
    const uploadInput = document.getElementById('uploadInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const dropZone = document.getElementById('dropZone');

    let selectedFiles = [];

    selectBtn.addEventListener('click', () => {
      uploadInput.click();
    });

    function syncInputFiles() {
      const dt = new DataTransfer();
      selectedFiles.forEach(file => dt.items.add(file));
      uploadInput.files = dt.files;
    }

    function renderFileList() {
      if (selectedFiles.length === 0) {
        fileNameDisplay.innerHTML = 'Kéo thả ảnh vào đây hoặc chọn từ thiết bị';
        fileNameDisplay.style.color = '#aaa';
        return;
      }

      let html = `<b>Đã chọn ${selectedFiles.length} ảnh:</b><br>`;

      selectedFiles.forEach((file, index) => {
        html += `
          <div class="selected-file-item">
            <span>${index + 1}. ${file.name}</span>
            <button class="remove-file-btn" data-index="${index}">✖</button>
          </div>
        `;
      });

      fileNameDisplay.innerHTML = html;
      fileNameDisplay.style.color = '#4ade80';

      document.querySelectorAll('.remove-file-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.index);
          selectedFiles.splice(index, 1);
          syncInputFiles();
          renderFileList();
        });
      });
    }

    function addFiles(newFiles) {
      for (const file of newFiles) {
        const exists = selectedFiles.some(
          f => f.name === file.name &&
               f.size === file.size &&
               f.lastModified === file.lastModified
        );

        if (!exists) selectedFiles.push(file);
      }

      syncInputFiles();
      renderFileList();
    }

    uploadInput.addEventListener('change', function () {
      addFiles(this.files);
      this.value = "";
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileNameDisplay.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      fileNameDisplay.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      fileNameDisplay.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
  </script>

</body>
</html>
